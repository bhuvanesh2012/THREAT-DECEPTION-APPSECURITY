<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vaultline — Sign in</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="wrap">
    <div class="seal"></div>
    <div class="brand">
      <div class="brand-mark">Vaultline</div>
      <div class="brand-sub">Secure Access System</div>
    </div>
    <div class="card">
      <div class="card-title">Sign in</div>
      <div class="card-desc">Enter your credentials to access your dashboard.</div>
      <form method="POST">
        <div class="field">
          <label>Username</label>
          <input type="text" name="username" required autocomplete="off">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" required>
        </div>
        <button class="btn" type="submit">Sign in</button>
      </form>
      {% if message %}<div class="message">{{ message }}</div>{% endif %}
      <div class="foot-link">No account yet? <a href="{{ url_for('register') }}">Register</a></div>
    </div>
  </div>
</body>
</html>
